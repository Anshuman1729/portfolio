<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anshuman Khare | Portfolio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .metric-card:hover { transform: translateY(-4px); }
  </style>
</head>

<body class="bg-slate-50 text-slate-900">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const Icon = ({ name, size = 18, className = "" }) => {
  useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  }, [name]);
  return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
};

const App = () => {

  const [activeTab, setActiveTab] = useState("experience");
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const handleScroll = () => setScrolled(window.scrollY > 50);
    window.addEventListener("scroll", handleScroll);
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  const stats = [
    { value: "Predictability > Volatility" },
    { value: "Segmentation Before Scale" },
    { value: "Economics-First Growth" },
    { value: "Structure Beats Hacks" }
  ];

  const experience = [
    {
      company: "Meesho",
      role: "Senior Associate – Performance Marketing",
      period: "Mar 2026 – Current",
      location: "Bengaluru, KA",
      highlights: [
        "Leading performance marketing initiatives focused on scalable and efficient growth.",
        "Driving acquisition systems anchored in contribution margins and long-term unit economics.",
        "Optimizing channel mix and experimentation velocity across paid ecosystems."
      ]
    },
    {
      company: "AppsForBharat",
      role: "Performance Marketing Associate",
      period: "Aug 2024 – Mar 2026",
      location: "Bengaluru, KA",

    {
      company: "ET Medialabs",
      role: "Associate, Business Strategy & Analysis",

      location: "Noida, UP",

        "Reduced CAC by 20% and increased new users by 25% for Urban Company.",
        "Delivered 22% revenue growth for a luxury fashion brand.",
        "Maintained 6.4 ROAS via structured intent & PMax frameworks."
      ]
    }
  ];

  return (

      {/* NAVIGATION */}

        <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">

            <a href="#experience" className="hover:text-indigo-600">Experience</a>

              <Icon name="trending-up" size={14} />

        <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-8">

          {/* EDUCATION */}

            <h3 className="text-2xl font-bold mb-8 flex items-center gap-3">
              <Icon name="book-open" className="text-indigo-600" />
              Education
            </h3>
            <h4 className="text-xl font-bold">

            </p>

            <form className="space-y-4">

      <footer className="py-12 text-center text-slate-400 text-xs font-bold uppercase tracking-widest border-t border-slate-100">
        © 2026 Anshuman Khare • Built for Growth
      </footer>

    </div>

};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
